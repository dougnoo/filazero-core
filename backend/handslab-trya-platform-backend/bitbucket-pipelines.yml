image: node:22-slim

definitions:
  services:
    docker:
      memory: 3000

  steps:
    - step: &validate-build
        name: Validate Build (PR Check)
        size: 2x
        caches:
          - node
        script:
          - echo "🔍 Validando build para Pull Request..."
          - npm install -g pnpm
          - pnpm install --frozen-lockfile
          - echo "Dependências instaladas"
          - pnpm run build
          - echo "Build compilado com sucesso"

    - step: &build-and-deploy
        name: Build and Deploy
        services:
          - docker
        caches:
          - node
          - docker
        size: 2x
        script:
          # --- Debug: verificar variáveis ---
          - echo "🔧 Ambiente = $BITBUCKET_DEPLOYMENT_ENVIRONMENT"
          - echo "🔧 AWS_REGION = $AWS_REGION"
          - echo "🔧 ECR_REGISTRY = $ECR_REGISTRY"
          - echo "🔧 ECS_CLUSTER = $ECS_CLUSTER"
          - echo "🔧 ECS_SERVICE = $ECS_SERVICE"

          # --- Build da aplicação ---
          - npm install -g pnpm
          - pnpm install --frozen-lockfile
          - pnpm run build

          # --- Gerar task-definition.json ---
          - apt-get update && apt-get install -y gettext-base
          - chmod +x scripts/generate-task-definition.sh
          - ./scripts/generate-task-definition.sh

          # --- Build da imagem Docker ---
          - echo "🐳 Building Docker image..."
          - docker build -t "${ECR_REPOSITORY}:latest" .

          # --- Push para ECR ---
          - echo "📦 Pushing to ECR..."
          - export ECR_REGION="${ECR_REGION:-$AWS_REGION}"
          - echo "🔧 ECR_REGION = $ECR_REGION"
          - pipe: atlassian/aws-ecr-push-image:2.6.0
            variables:
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_DEFAULT_REGION: $ECR_REGION
              IMAGE_NAME: "$ECR_REPOSITORY"
              TAGS: "latest"

          # --- Deploy no ECS ---
          - echo "🚀 Deploying to ECS..."
          - pipe: atlassian/aws-ecs-deploy:1.15.0
            variables:
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_DEFAULT_REGION: $AWS_REGION
              CLUSTER_NAME: $ECS_CLUSTER
              SERVICE_NAME: $ECS_SERVICE
              TASK_DEFINITION: task-definition.json

          - echo "Deploy completed!"

    - step: &run-migrations
        name: Run Database Migrations
        size: 2x
        caches:
          - node
        script:
          - echo "🗄️ Running database migrations..."
          - npm ci
          - npm run typeorm:migration:run
          - echo "Migrations completed!"

pipelines:
  pull-requests:
    '**':
      - step:
          <<: *validate-build

  branches:
    development:
      - step:
          <<: *build-and-deploy
          name: Build & Deploy (DEV)
          deployment: Develop

    # ========== STAGING / HML ==========
    # IMPORTANTE: Este ambiente deploya para a CONTA AWS HML (separada)
    # Configure as seguintes variaveis no Bitbucket Deployments > Staging:
    #   - AWS_ACCESS_KEY_ID: Credenciais da conta HML
    #   - AWS_SECRET_ACCESS_KEY: Credenciais da conta HML
    #   - AWS_REGION: sa-east-1
    #   - ECR_REGISTRY: <HML_ACCOUNT_ID>.dkr.ecr.sa-east-1.amazonaws.com
    #   - ECR_REPOSITORY: trya-platform-backend-hml
    #   - ECS_CLUSTER: trya-platform-backend-hml-cluster
    #   - ECS_SERVICE: trya-platform-backend-hml-service
    #   - IMAGE_NAME: trya-platform-backend-hml
    staging:
      - step:
          <<: *build-and-deploy
          name: Build & Deploy (HML)
          deployment: Staging

    main:
      - step:
          <<: *build-and-deploy
          name: Build & Deploy (PROD)
          deployment: Production
