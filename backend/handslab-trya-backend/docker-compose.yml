version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: handslab-trya-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # JWT      
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      
      # AWS General
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      
      # AWS Cognito
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-http://localhost:3000/auth/callback}
      
      # Database
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-handslab_trya}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-handslab_trya}?schema=public}
      
      # AWS DynamoDB
      DYNAMODB_SESSIONS_TABLE: ${DYNAMODB_SESSIONS_TABLE:-triagem-sessions}
      
      # Redis/ElastiCache (optional)
      ELASTICACHE_HOST: ${ELASTICACHE_HOST}
      ELASTICACHE_PORT: ${ELASTICACHE_PORT:-6379}
      ELASTICACHE_TLS: ${ELASTICACHE_TLS:-true}
      
      # Network Providers
      AMIL_API_BASE_URL: ${AMIL_API_BASE_URL:-https://www.amil.com.br/portal/web/servicos/saude/rede-credenciada}
    networks:
      - trya-network
    volumes:
      # Mount logs directory (optional)
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 404 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  trya-network:
    driver: bridge

volumes:
  logs:
    driver: local

