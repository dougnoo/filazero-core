version: '3.8'

services:
  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nestjs-bedrock:latest
    container_name: nestjs-bedrock-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # AWS Credentials via IAM Role (recomendado para AWS)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_AGENT_ID=${AWS_AGENT_ID}
      - AWS_AGENT_ALIAS_ID=${AWS_AGENT_ALIAS_ID}
      - BEDROCK_REQUESTS_PER_MINUTE=${BEDROCK_REQUESTS_PER_MINUTE:-2}
    networks:
      - bedrock-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: nestjs-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nestjs-app
    networks:
      - bedrock-network
    restart: always

networks:
  bedrock-network:
    driver: bridge