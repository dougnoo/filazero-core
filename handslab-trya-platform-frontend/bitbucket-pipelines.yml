image: atlassian/default-image:4

options:
  docker: true
  size: 2x

definitions:
  services:
    docker:
      memory: 7128 # 7GB para o Docker daemon
  caches:
    nextcache: .next/cache

  steps:
    - step: &build-and-deploy
        name: Build Docker Image and Deploy to ECS
        services:
          - docker
        script:
          # Instalar AWS CLI e jq (modo não-interativo)
          - export DEBIAN_FRONTEND=noninteractive
          - apt-get update && apt-get install -y --no-install-recommends awscli jq

          # Configurar variáveis de ambiente do build
          - |
            echo "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_URL" >> .env.production
            echo "NEXT_PUBLIC_PLATFORM_API_BASE_URL=$NEXT_PUBLIC_PLATFORM_API_URL" >> .env.production
            echo "NODE_ENV=production" >> .env.production

          # Instalar dependências do projeto
          - npm ci --legacy-peer-deps

          # Login no AWS ECR
          - |
            aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
            docker login --username AWS --password-stdin $AWS_ECR_REGISTRY

          # Build da imagem Docker
          - |
            IMAGE_TAG="${BITBUCKET_COMMIT:0:7}"
            IMAGE_URI="${AWS_ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:${IMAGE_TAG}"
            IMAGE_URI_LATEST="${AWS_ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:latest"

            echo "Building Docker image..."
            docker build -t $IMAGE_URI -t $IMAGE_URI_LATEST .

          # Push das imagens para ECR
          - |
            echo "Pushing Docker images to ECR..."
            docker push $IMAGE_URI
            docker push $IMAGE_URI_LATEST

          # Atualizar task definition e fazer deploy no ECS
          - |
            echo "Deploying to ECS..."
            TASK_DEFINITION=$(aws ecs describe-task-definition \
              --task-definition $ECS_TASK_DEFINITION \
              --region $AWS_DEFAULT_REGION)

            NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | \
              jq --arg IMAGE $IMAGE_URI \
              '.taskDefinition | 
               del(.taskDefinitionArn) | 
               del(.revision) | 
               del(.status) | 
               del(.requiresAttributes) | 
               del(.compatibilities) | 
               del(.registeredAt) | 
               del(.registeredBy) |
               .containerDefinitions[0].image = $IMAGE')

            NEW_TASK_DEFINITION_JSON=$(echo $NEW_TASK_DEFINITION | jq -c .)

            # Registrar nova revisão da task definition
            NEW_TASK_DEF=$(aws ecs register-task-definition \
              --region $AWS_DEFAULT_REGION \
              --cli-input-json "$NEW_TASK_DEFINITION_JSON")

            NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')

            # Atualizar o serviço ECS
            aws ecs update-service \
              --cluster $ECS_CLUSTER_NAME \
              --service $ECS_SERVICE_NAME \
              --task-definition $NEW_TASK_DEF_ARN \
              --region $AWS_DEFAULT_REGION \
              --force-new-deployment

            echo "Deployment initiated. Task Definition: $NEW_TASK_DEF_ARN"

          # Aguardar estabilização do serviço (opcional)
          - |
            if [ "$WAIT_FOR_DEPLOYMENT" = "true" ]; then
              echo "Waiting for service to stabilize..."
              aws ecs wait services-stable \
                --cluster $ECS_CLUSTER_NAME \
                --services $ECS_SERVICE_NAME \
                --region $AWS_DEFAULT_REGION
              echo "Service is stable!"
            fi

          # Invalidar cache do CloudFront
          - |
            if [ ! -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
              echo "Invalidating CloudFront cache..."
              INVALIDATION_ID=$(aws cloudfront create-invalidation \
                --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
                --paths "/*" \
                --region $AWS_DEFAULT_REGION \
                --query 'Invalidation.Id' \
                --output text)
              echo "CloudFront invalidation created: $INVALIDATION_ID"
            fi
        caches:
          - node
          - nextcache

pipelines:
  branches:
    # ========== DEVELOPMENT ==========
    development:
      - step:
          name: Build and Deploy to Dev
          size: 2x
          services:
            - docker
          script:
            - export ECR_REPOSITORY_NAME="trya-frontend-dev"
            - export ECS_CLUSTER_NAME="trya-frontend-dev-cluster"
            - export ECS_SERVICE_NAME="trya-frontend-dev-service"
            - export ECS_TASK_DEFINITION="trya-frontend-dev-service"
            - export CLOUDFRONT_ID="$CLOUDFRONT_DISTRIBUTION_ID_DEV"
            - export API_URL="$NEXT_PUBLIC_API_URL_DEV"
            - export DEBIAN_FRONTEND=noninteractive
            - apt-get update && apt-get install -y --no-install-recommends awscli jq
            - echo "NEXT_PUBLIC_API_BASE_URL=$API_URL" >> .env.production
            - echo "NEXT_PUBLIC_PLATFORM_API_BASE_URL=$NEXT_PUBLIC_PLATFORM_API_URL_DEV" >> .env.production
            - echo "NODE_ENV=production" >> .env.production
            - npm ci --legacy-peer-deps
            - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ECR_REGISTRY
            - IMAGE_TAG="${BITBUCKET_COMMIT:0:7}"
            - IMAGE_URI="${AWS_ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:${IMAGE_TAG}"
            - IMAGE_URI_LATEST="${AWS_ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:latest"
            - docker build -t $IMAGE_URI -t $IMAGE_URI_LATEST .
            - docker push $IMAGE_URI
            - docker push $IMAGE_URI_LATEST
            - |
              TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --region $AWS_DEFAULT_REGION)
              NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq --arg IMAGE $IMAGE_URI '.taskDefinition | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities) | del(.registeredAt) | del(.registeredBy) | .containerDefinitions[0].image = $IMAGE')
              NEW_TASK_DEF=$(aws ecs register-task-definition --region $AWS_DEFAULT_REGION --cli-input-json "$(echo $NEW_TASK_DEFINITION | jq -c .)")
              NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')
              aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_SERVICE_NAME --task-definition $NEW_TASK_DEF_ARN --region $AWS_DEFAULT_REGION --force-new-deployment
            - |
              if [ ! -z "$CLOUDFRONT_ID" ]; then
                aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*" --query 'Invalidation.Id' --output text
              fi
          caches:
            - node
            - nextcache

    # ========== STAGING ==========
