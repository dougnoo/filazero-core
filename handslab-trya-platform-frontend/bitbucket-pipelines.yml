            - echo "NEXT_PUBLIC_API_BASE_URL=$API_URL" >> .env.production
            - echo "NEXT_PUBLIC_PLATFORM_API_BASE_URL=$NEXT_PUBLIC_PLATFORM_API_URL_PROD" >> .env.production
