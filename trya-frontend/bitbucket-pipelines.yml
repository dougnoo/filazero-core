image: atlassian/default-image:4

options:
  docker: true
  size: 2x

definitions:
  services:
    docker:
      memory: 7128
  caches:
    nextcache: .next/cache

pipelines:
  branches:
    # ========== DEVELOPMENT ==========
    development:
      - step:
          name: Build and Deploy to Dev
          size: 2x
          services:
            - docker
          script:
            - export DEBIAN_FRONTEND=noninteractive
            - apt-get update && apt-get install -y --no-install-recommends awscli jq
            
            # Configurar .env.production
            - echo "NEXT_PUBLIC_API_BASE_URL=https://dev-api.trya.ai" >> .env.production
            - echo "NEXT_PUBLIC_PLATFORM_API_BASE_URL=https://platform-dev.trya.ai/api" >> .env.production
            - echo "NEXT_PUBLIC_MEMED_SCRIPT_URL=$NEXT_PUBLIC_MEMED_SCRIPT_URL" >> .env.production
            - echo "NEXT_PUBLIC_ASSETS_S3_URL=https://trya-assets-dev.s3.us-east-1.amazonaws.com" >> .env.production
            - echo "NODE_ENV=production" >> .env.production
            - cat .env.production
            
            - npm ci --legacy-peer-deps
            
            # Login ECR
            - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin 416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
            
            # Build e Push
            - IMAGE_TAG="${BITBUCKET_COMMIT:0:7}"
            - IMAGE_URI="416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/trya-frontend-dev:${IMAGE_TAG}"
            - IMAGE_URI_LATEST="416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/trya-frontend-dev:latest"
            - docker build -t $IMAGE_URI -t $IMAGE_URI_LATEST .
            - docker push $IMAGE_URI
            - docker push $IMAGE_URI_LATEST
            
            # Deploy ECS
            - |
              TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition trya-frontend-dev-task --region ${AWS_DEFAULT_REGION})
              NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq --arg IMAGE $IMAGE_URI '.taskDefinition | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $IMAGE')
              NEW_TASK_DEF=$(aws ecs register-task-definition --region ${AWS_DEFAULT_REGION} --cli-input-json "$(echo $NEW_TASK_DEFINITION | jq -c .)")
              NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')
              aws ecs update-service --cluster trya-cluster --service trya-frontend-dev-service --task-definition $NEW_TASK_DEF_ARN --region ${AWS_DEFAULT_REGION} --force-new-deployment
            
            # CloudFront invalidation (opcional)
            - |
              if [ ! -z "$CLOUDFRONT_DISTRIBUTION_ID_DEV" ]; then
                aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID_DEV --paths "/*" --region ${AWS_DEFAULT_REGION}
              fi
          caches:
            - node
            - nextcache

    # ========== STAGING / HML ==========
    staging:
      - step:
          name: Build and Deploy to HML
          size: 2x
          services:
            - docker
          script:
            - export DEBIAN_FRONTEND=noninteractive
            - apt-get update && apt-get install -y --no-install-recommends awscli jq
            
            # Configurar .env.production
            - echo "NEXT_PUBLIC_API_BASE_URL=https://api-hml.trya.ai" >> .env.production
            - echo "NEXT_PUBLIC_PLATFORM_API_BASE_URL=https://platform-hml.trya.ai/api" >> .env.production
            - echo "NEXT_PUBLIC_MEMED_SCRIPT_URL=$NEXT_PUBLIC_MEMED_SCRIPT_URL" >> .env.production
            - echo "NEXT_PUBLIC_ASSETS_S3_URL=https://trya-assets-hml.s3.us-east-1.amazonaws.com" >> .env.production
            - echo "NODE_ENV=production" >> .env.production
            - cat .env.production
            
            - npm ci --legacy-peer-deps
            
            # Login ECR
            - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin 416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
            
            # Build e Push
            - IMAGE_TAG="${BITBUCKET_COMMIT:0:7}"
            - IMAGE_URI="416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/trya-hml-frontend:${IMAGE_TAG}"
            - IMAGE_URI_LATEST="416684166863.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/trya-hml-frontend:latest"
            - docker build -t $IMAGE_URI -t $IMAGE_URI_LATEST .
            - docker push $IMAGE_URI
            - docker push $IMAGE_URI_LATEST
            
            # Deploy ECS
            - |
              TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition Trya-hml-fe-task --region ${AWS_DEFAULT_REGION})
              NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq --arg IMAGE $IMAGE_URI '.taskDefinition | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $IMAGE')
              NEW_TASK_DEF=$(aws ecs register-task-definition --region ${AWS_DEFAULT_REGION} --cli-input-json "$(echo $NEW_TASK_DEFINITION | jq -c .)")
              NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')
              aws ecs update-service --cluster Trya-hml-fe-cluster --service Trya-hml-fe-service --task-definition $NEW_TASK_DEF_ARN --region ${AWS_DEFAULT_REGION} --force-new-deployment
            
            # CloudFront invalidation (opcional)
            - |
              if [ ! -z "$CLOUDFRONT_DISTRIBUTION_ID_STAGING" ]; then
                aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID_STAGING --paths "/*" --region ${AWS_DEFAULT_REGION}
              fi
          caches:
            - node
            - nextcache
