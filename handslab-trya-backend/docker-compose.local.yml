services:
  postgres:
    image: postgres:16-alpine
    container_name: handslab-trya-postgres-local
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trya}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    networks:
      - trya-network-local
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: handslab-trya-backend-local
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Application
      NODE_ENV: development
      PORT: ${PORT:-3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Notification Service
      NOTIFICATION_SERVICE: ${NOTIFICATION_SERVICE:-console}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@trya.health}
      SES_FROM_NAME: ${SES_FROM_NAME:-HandsLab}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      TRYA_PLATFORM_API_KEY: ${TRYA_PLATFORM_API_KEY:-secreto}
      TRYA_PLATFORM_API_URL: ${TRYA_PLATFORM_API_URL}
      
      # AWS General
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      # AWS Cognito
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-http://localhost:3000/auth/callback}

      # AWS Bedrock
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}

      # AWS S3
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-trya-dev-frontend}
      S3_BUCKET_REGION: ${S3_BUCKET_REGION:-sa-east-1}
      S3_BUCKET_CHAT_NAME: ${S3_BUCKET_CHAT_NAME:-trya-chat}

      # AWS DynamoDB
      DYNAMODB_TENANTS_TABLE: ${DYNAMODB_TENANTS_TABLE:-trya-tenants}
      DYNAMODB_USERS_TABLE: ${DYNAMODB_USERS_TABLE:-trya-users}
      DYNAMODB_TRIAGE_TABLE: ${DYNAMODB_TRIAGE_TABLE:-trya-triage}
      DYNAMODB_MEDICAL_RECORDS_TABLE: ${DYNAMODB_MEDICAL_RECORDS_TABLE:-trya-medical-records}
      DYNAMODB_OTP_TABLE_NAME: ${DYNAMODB_OTP_TABLE_NAME:-trya-otp}
      DYNAMODB_CONFIG_TABLE: ${DYNAMODB_CONFIG_TABLE:-trya-config}
      DYNAMODB_SESSIONS_TABLE: ${DYNAMODB_SESSIONS_TABLE:-triagem-sessions}

      # Redis/ElastiCache (optional)
      ELASTICACHE_HOST: ${ELASTICACHE_HOST}
      ELASTICACHE_PORT: ${ELASTICACHE_PORT:-6379}
      ELASTICACHE_TLS: ${ELASTICACHE_TLS:-false}

      # OTP Storage
      OTP_STORAGE: ${OTP_STORAGE:-memory}
      
      # Database
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trya}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB:-trya}?schema=public

      #AWS Lambda
      LAMBDA_CHAT_FUNCTION_NAME : ${LAMBDA_CHAT_FUNCTION_NAME:-trya-chat-function}

      # Network Providers
      AMIL_API_BASE_URL: ${AMIL_API_BASE_URL:-https://www.amil.com.br/portal/web/servicos/saude/rede-credenciada}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-example-encryption-key-32chars!}
      
    networks:
      - trya-network-local
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
      # IMPORTANTE: Não montar package.json e pnpm-lock.yaml para evitar conflitos
      # entre node_modules do Windows e Linux
      # Prevent node_modules from being overwritten by host (cross-platform issue)
      - node_modules_local:/app/node_modules
      # Mount AWS credentials for SSO (uncomment for macOS/Linux)
      - ~/.aws:/root/.aws:ro
    command: pnpm run start:dev

networks:
  trya-network-local:
    driver: bridge

volumes:
  postgres_data_local:
    driver: local
  node_modules_local:
    driver: local
