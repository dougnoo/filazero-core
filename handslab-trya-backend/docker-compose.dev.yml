version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: handslab-trya-backend-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Application
      NODE_ENV: development
      PORT: ${PORT:-3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # Notification Service
      NOTIFICATION_SERVICE: ${NOTIFICATION_SERVICE:-console}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@trya.health}
      SES_FROM_NAME: ${SES_FROM_NAME:-HandsLab}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      
       # AWS General
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE}
      # AWS_ACCESS_KEY_ID e AWS_SECRET_ACCESS_KEY não são necessárias quando usando AWS SSO
      # Se você precisar usar credenciais fixas, descomente as linhas abaixo e preencha
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      
      # AWS Cognito
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-http://localhost:3000/auth/callback}
      
      # Database
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trya}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-trya}?schema=public}
      
      # AWS DynamoDB
      DYNAMODB_SESSIONS_TABLE: ${DYNAMODB_SESSIONS_TABLE:-triagem-sessions}
      
      # Redis/ElastiCache (optional)
      ELASTICACHE_HOST: ${ELASTICACHE_HOST}
      ELASTICACHE_PORT: ${ELASTICACHE_PORT:-6379}
      ELASTICACHE_TLS: ${ELASTICACHE_TLS:-false}
      
      # Network Providers
      AMIL_API_BASE_URL: ${AMIL_API_BASE_URL:-https://www.amil.com.br/portal/web/servicos/saude/rede-credenciada}
    networks:
      - trya-network-dev
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
      # Prevent node_modules from being overwritten
      - /app/node_modules
    command: npm run start:dev  

networks:
  trya-network-dev:
    driver: bridge

