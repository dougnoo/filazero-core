name: Deploy Frontend to S3/CloudFront

on:
  push:
    branches:
      - develop  # Deploy to dev
      - main     # Deploy to hml
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: sa-east-1
  NODE_VERSION: '20'

jobs:
  setup:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      s3_bucket: ${{ steps.set-env.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.set-env.outputs.cloudfront_id }}
      domain: ${{ steps.set-env.outputs.domain }}
    steps:
      - name: Set environment based on branch
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="hml"
          else
            ENV="dev"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "s3_bucket=trya-${ENV}-frontend" >> $GITHUB_OUTPUT
          echo "domain=${ENV}.trya.com.br" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build application
        env:
          NEXT_PUBLIC_API_URL: https://api-${{ needs.setup.outputs.environment }}.trya.com.br
          NEXT_PUBLIC_ENV: ${{ needs.setup.outputs.environment }}
        run: npm run build
        working-directory: ./frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFront Distribution ID
        id: get-cf-id
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@, '${{ needs.setup.outputs.domain }}')]].Id | [0]" \
            --output text)
          echo "cloudfront_id=$CF_ID" >> $GITHUB_OUTPUT

      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend/out s3://${{ needs.setup.outputs.s3_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sw.js"
          
          aws s3 sync ./frontend/out s3://${{ needs.setup.outputs.s3_bucket }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "sw.js" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cf-id.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "### Deployment Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ needs.setup.outputs.s3_bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront ID:** ${{ steps.get-cf-id.outputs.cloudfront_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 View your site at: https://${{ needs.setup.outputs.domain }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ CloudFront cache invalidation in progress. Changes may take a few minutes to propagate." >> $GITHUB_STEP_SUMMARY
