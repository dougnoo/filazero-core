# Backend configuration for Terraform state - Conta HML
# IMPORTANTE: Este backend aponta para recursos na CONTA AWS de HML
# Execute o script scripts/bootstrap-hml-account.sh na conta HML primeiro

bucket         = "trya-terraform-state-hml"
key            = "hml/terraform.tfstate"
region         = "sa-east-1"
encrypt        = true
dynamodb_table = "trya-terraform-locks-hml"

# Para inicializar com credenciais da conta HML:
# AWS_PROFILE=hml terraform init -backend-config=environments/hml/backend.conf
